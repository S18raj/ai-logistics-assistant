<!doctype html>
<html>
  <head>
    <title>AI Logistics Assistant</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        padding-top: 40px;
      }

      .chat-container {
        width: 500px;
        background: white;
        padding: 20px;
        border-radius: 10px;
      }

      .messages {
        height: 400px;
        overflow-y: auto;
        border: 1px solid #ddd;
        padding: 10px;
        margin-bottom: 10px;
      }

      .user {
        text-align: right;
        color: blue;
        margin: 5px;
      }

      .bot {
        text-align: left;
        color: green;
        margin: 5px;
      }

      input {
        width: 80%;
        padding: 10px;
      }

      button {
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <div class="chat-container">
      <h2>AI Logistics Assistant</h2>

      <div class="messages" id="chat"></div>

      <input id="input" placeholder="Ask something..." />
      <button onclick="send()">Send</button>
    </div>

    <script>
      async function send() {
        let input = document.getElementById("input");
        let chat = document.getElementById("chat");

        let userText = input.value;
        if (!userText) return;

        chat.innerHTML += `<div class='user'>You: ${userText}</div>`;

        input.value = "";

        let res = await fetch("http://127.0.0.1:8000/query", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ query: userText }),
        });

        let data = await res.json();

        chat.innerHTML += `<div class='bot'>AI: ${data.response}</div>`;
      }
    </script>
  </body>
</html>
