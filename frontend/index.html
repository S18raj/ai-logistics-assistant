<!doctype html>
<html>
  <head>
    <title>AI Logistics Assistant</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #eef2f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .chat-container {
        width: 650px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        padding: 25px;
      }

      h2 {
        margin: 0;
        color: #1f2937;
      }

      .subtitle {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 20px;
      }

      .messages {
        height: 420px;
        overflow-y: auto;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 15px;
        background: #f9fafb;
        margin-bottom: 15px;
      }

      .message {
        margin: 12px 0;
        padding: 12px;
        border-radius: 10px;
        max-width: 85%;
        white-space: pre-wrap;
      }

      .user {
        background: #dbeafe;
        margin-left: auto;
        text-align: right;
      }

      .bot {
        background: #dcfce7;
        margin-right: auto;
      }

      .input-area {
        display: flex;
        gap: 10px;
      }

      input {
        flex: 1;
        padding: 14px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 15px;
      }

      button {
        padding: 14px 22px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 15px;
      }

      button:hover {
        background: #1d4ed8;
      }

      .clear-btn {
        margin-top: 10px;
        background: #ef4444;
      }

      .clear-btn:hover {
        background: #dc2626;
      }
    </style>
  </head>

  <body>
    <div class="chat-container">
      <h2>AI Logistics Assistant</h2>
      <div class="subtitle">RAG-powered logistics support system</div>

      <div class="messages" id="chat"></div>

      <div class="input-area">
        <input
          id="input"
          placeholder="Ask about delivery, refunds, delays..."
        />
        <button onclick="send()">Send</button>
      </div>

      <button class="clear-btn" onclick="clearChat()">Clear History</button>
    </div>

    <script>
      window.onload = function () {
        document.getElementById("chat").innerHTML =
          localStorage.getItem("chatHistory") || "";
      };

      async function send() {
        let input = document.getElementById("input");
        let chat = document.getElementById("chat");

        let userText = input.value;
        if (!userText) return;

        chat.innerHTML += `<div class="message user"><b>You:</b><br>${userText}</div>`;
        localStorage.setItem("chatHistory", chat.innerHTML);

        input.value = "";

        let res = await fetch("http://127.0.0.1:8000/query", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ query: userText }),
        });

        let data = await res.json();

        chat.innerHTML += `<div class="message bot"><b>AI Response:</b><br>${data.response}</div>`;
        localStorage.setItem("chatHistory", chat.innerHTML);

        chat.scrollTop = chat.scrollHeight;
      }

      function clearChat() {
        localStorage.removeItem("chatHistory");
        document.getElementById("chat").innerHTML = "";
      }
    </script>
  </body>
</html>
